services:
  recepten-bot:
    build: .
    container_name: recepten-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_GROUP_ID=${TELEGRAM_GROUP_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - VPS_WEBHOOK_URL=${VPS_WEBHOOK_URL}
      - VPS_SHARED_SECRET=${VPS_SHARED_SECRET}
      - TZ=Europe/Amsterdam
    volumes:
      - ./data:/app/data
    networks:
      - recepten

networks:
  recepten:
    driver: bridge
