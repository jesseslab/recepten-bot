limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name recepten.example.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name recepten.example.com;

    ssl_certificate /etc/letsencrypt/live/recepten.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recepten.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Webapp — serve static files
    location / {
        root /etc/nginx/html;
        try_files $uri /index.html;
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
    }

    # Webhook endpoint — restricted to NUC IP
    location /api/ {
        limit_req zone=api burst=5 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
