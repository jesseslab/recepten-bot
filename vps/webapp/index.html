<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekmenu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf7f2;
      --warm-white: #fff9f3;
      --terracotta: #c4622d;
      --terracotta-light: #e8845a;
      --dark: #1e1a16;
      --muted: #7a6e65;
      --border: #e8ddd4;
      --success: #4a7c59;
      --card: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--dark);
      min-height: 100vh;
    }

    header {
      background: var(--terracotta);
      color: white;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(196,98,45,0.3);
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header p {
      font-size: 0.8rem;
      opacity: 0.85;
      margin-top: 2px;
    }

    .tabs {
      display: flex;
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: none;
      padding: 12px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--terracotta);
      border-bottom-color: var(--terracotta);
    }

    .tab.today-tab {
      color: var(--success);
      font-weight: 600;
    }

    .tab.today-tab.active {
      color: var(--success);
      border-bottom-color: var(--success);
    }

    .content {
      padding: 16px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Today card */
    .today-card {
      background: var(--terracotta);
      color: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .today-card::before {
      content: '';
      position: absolute;
      top: -20px;
      right: -20px;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }

    .today-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.8;
    }

    .today-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      margin-top: 4px;
      line-height: 1.3;
    }

    .today-card .meta {
      display: flex;
      gap: 12px;
      margin-top: 10px;
      font-size: 0.8rem;
      opacity: 0.9;
    }

    .today-card .btn {
      display: inline-block;
      margin-top: 14px;
      background: rgba(255,255,255,0.2);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .today-card .btn:hover { background: rgba(255,255,255,0.3); }

    /* Defrost alert */
    .defrost-alert {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
    }

    .defrost-alert .icon { font-size: 1.3rem; }

    /* Week overview */
    .week-list { display: flex; flex-direction: column; gap: 8px; }

    .day-card {
      background: var(--card);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .day-card:hover { border-color: var(--terracotta-light); transform: translateY(-1px); }

    .day-card.today {
      border-color: var(--terracotta);
      border-width: 2px;
    }

    .day-card.empty { opacity: 0.45; cursor: default; }

    .day-card .day-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      width: 36px;
      flex-shrink: 0;
    }

    .day-card .day-icon { font-size: 1.4rem; flex-shrink: 0; }

    .day-card .day-info { flex: 1; min-width: 0; }

    .day-card .day-name {
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .day-card .day-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .day-card .badges { display: flex; gap: 4px; flex-shrink: 0; }

    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    .badge-wildcard { background: #fef3c7; color: #92400e; }
    .badge-serieus { background: #ede9fe; color: #5b21b6; }
    .badge-vega { background: #dcfce7; color: #166534; }
    .badge-gf { background: #fee2e2; color: #991b1b; }

    /* Recipe view */
    .recipe-view { display: none; }

    .recipe-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--terracotta);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 16px;
    }

    .recipe-header {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .recipe-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      line-height: 1.3;
    }

    .recipe-header .recipe-meta {
      display: flex;
      gap: 16px;
      margin-top: 10px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .recipe-header .recipe-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 10px;
    }

    .gf-note {
      background: #fff3e0;
      border: 1px solid #ffcc80;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.8rem;
      margin-bottom: 16px;
    }

    .recipe-section {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .recipe-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .ingredient-list { list-style: none; }

    .ingredient-list li {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border);
    }

    .ingredient-list li:last-child { border-bottom: none; }

    .ingredient-list .amount {
      color: var(--terracotta);
      font-weight: 500;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .steps-list { list-style: none; counter-reset: steps; }

    .steps-list li {
      display: flex;
      gap: 12px;
      padding: 8px 0;
      font-size: 0.9rem;
      line-height: 1.5;
      counter-increment: steps;
    }

    .steps-list li::before {
      content: counter(steps);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--terracotta);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .tip-box {
      background: #f0fdf4;
      border-left: 3px solid var(--success);
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 0.85rem;
      margin-top: 4px;
    }

    /* Shopping list */
    .shopping-section {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .shopping-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .shopping-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .shopping-item:last-child { border-bottom: none; }

    .shopping-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--terracotta); }

    .shopping-item label {
      flex: 1;
      font-size: 0.88rem;
      cursor: pointer;
    }

    .shopping-item.checked label { text-decoration: line-through; color: var(--muted); }

    .shopping-item .gf-tag {
      font-size: 0.65rem;
      background: #fee2e2;
      color: #991b1b;
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* Loading & empty states */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--terracotta);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .empty .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <h1>🍽️ Weekmenu</h1>
  <p id="header-week">Laden...</p>
</header>

<div class="tabs" id="tabs">
  <div class="tab active" data-view="week" onclick="showView('week')">Deze week</div>
  <div class="tab" data-view="shopping" onclick="showView('shopping')">🛒 Boodschappen</div>
</div>

<div class="content">

  <!-- Week view -->
  <div id="view-week">
    <div id="today-section"></div>
    <div id="defrost-section"></div>
    <div id="week-list" class="week-list"></div>
  </div>

  <!-- Recipe view (overlay) -->
  <div id="view-recipe" class="recipe-view">
    <div class="recipe-back" onclick="closeRecipe()">← Terug</div>
    <div id="recipe-content"></div>
  </div>

  <!-- Shopping view -->
  <div id="view-shopping" style="display:none">
    <div id="shopping-content"></div>
  </div>

</div>

<script>
  const DAYS = ['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
  const TYPE_ICONS = { vlees:'🥩', vis:'🐟', vega:'🌱', gevogelte:'🍳' };

  let planData = null;
  let checkedItems = JSON.parse(localStorage.getItem('checked') || '{}');

  async function loadPlan() {
    try {
      const res = await fetch('/api/plan');
      if (!res.ok) throw new Error('no plan');
      planData = await res.json();
      render();
    } catch(e) {
      document.getElementById('view-week').innerHTML = `
        <div class="empty">
          <div class="emoji">🍳</div>
          <p>Nog geen weekmenu gevonden.</p>
          <p style="margin-top:8px;font-size:0.8rem">Stuur /genereer in Telegram om te starten.</p>
        </div>`;
    }
  }

  function getTodayName() {
    return DAYS[new Date().getDay() === 0 ? 6 : new Date().getDay() - 1];
  }

  function getTomorrowName() {
    const idx = DAYS.indexOf(getTodayName());
    return DAYS[(idx + 1) % 7];
  }

  function render() {
    if (!planData) return;
    const plan = planData.plan;
    const days = plan.days || {};

    // Header week
    document.getElementById('header-week').textContent = `Week van ${plan.week_start}`;

    const today = getTodayName();
    const tomorrow = getTomorrowName();
    const todayRecipe = days[today];
    const tomorrowRecipe = days[tomorrow];

    // Today card
    const todaySection = document.getElementById('today-section');
    if (todayRecipe) {
      const icon = TYPE_ICONS[todayRecipe.type] || '🍴';
      todaySection.innerHTML = `
        <div class="today-card">
          <div class="label">Vanavond</div>
          <h2>${icon} ${todayRecipe.naam}</h2>
          <div class="meta">
            <span>⏱ ${todayRecipe.tijd_minuten} min</span>
            <span>${todayRecipe.moeilijkheid}</span>
          </div>
          <button class="btn" onclick="showRecipe('${today}')">Recept bekijken →</button>
        </div>`;
    }

    // Defrost alert
    const defrostSection = document.getElementById('defrost-section');
    if (tomorrowRecipe && ['vlees','vis','gevogelte'].includes(tomorrowRecipe.type)) {
      defrostSection.innerHTML = `
        <div class="defrost-alert">
          <span class="icon">🧊</span>
          <div><strong>Vergeet niet:</strong> haal het vlees voor morgen
          (${tomorrowRecipe.naam}) uit de vriezer!</div>
        </div>`;
    }

    // Week list
    const list = document.getElementById('week-list');
    list.innerHTML = DAYS.map(day => {
      const r = days[day];
      const isToday = day === today;
      if (!r) return `
        <div class="day-card empty">
          <span class="day-label">${day.slice(0,2)}</span>
          <span class="day-icon">—</span>
          <div class="day-info"><div class="day-name" style="color:var(--muted)">Vrij</div></div>
        </div>`;

      const icon = TYPE_ICONS[r.type] || '🍴';
      const badges = [
        r.wildcard ? '<span class="badge badge-wildcard">🌍 wildcard</span>' : '',
        r.serieus ? '<span class="badge badge-serieus">👨‍🍳 serieus</span>' : '',
        r.type === 'vega' ? '<span class="badge badge-vega">🌱 vega</span>' : '',
        r.gluten === 'aanpasbaar' ? '<span class="badge badge-gf">⚠️ GF</span>' : '',
      ].filter(Boolean).join('');

      return `
        <div class="day-card${isToday ? ' today' : ''}" onclick="showRecipe('${day}')">
          <span class="day-label">${day.slice(0,2)}</span>
          <span class="day-icon">${icon}</span>
          <div class="day-info">
            <div class="day-name">${r.naam}</div>
            <div class="day-meta">⏱ ${r.tijd_minuten} min · ${r.moeilijkheid}</div>
          </div>
          <div class="badges">${badges}</div>
        </div>`;
    }).join('');

    renderShopping();
  }

  function showRecipe(day) {
    if (!planData) return;
    const recipe = planData.plan.days[day];
    if (!recipe) return;

    const icon = TYPE_ICONS[recipe.type] || '🍴';
    const badges = [
      recipe.wildcard ? '<span class="badge badge-wildcard">🌍 wildcard</span>' : '',
      recipe.serieus ? '<span class="badge badge-serieus">👨‍🍳 serieus</span>' : '',
      recipe.type === 'vega' ? '<span class="badge badge-vega">🌱 vega</span>' : '',
    ].filter(Boolean).join('');

    const gfNote = recipe.gluten === 'aanpasbaar'
      ? `<div class="gf-note">⚠️ <strong>GF tip:</strong> ${recipe.gluten_tip || 'gebruik glutenvrije variant'}</div>`
      : '';

    const ingredients = (recipe.ingredienten || []).map(ing =>
      `<li><span>${ing.naam}</span><span class="amount">${ing.hoeveelheid}${ing.eenheid || ''}</span></li>`
    ).join('');

    const steps = (recipe.bereidingswijze || []).map(s => `<li>${s}</li>`).join('');

    const tip = recipe.tip
      ? `<div class="tip-box">💡 ${recipe.tip}</div>`
      : '';

    document.getElementById('recipe-content').innerHTML = `
      <div class="recipe-header">
        <h2>${icon} ${recipe.naam}</h2>
        <div class="recipe-meta">
          <span>⏱ ${recipe.tijd_minuten} min</span>
          <span>${recipe.moeilijkheid}</span>
          <span>👨‍👩‍👧‍👦 4 personen</span>
        </div>
        <div class="recipe-badges">${badges}</div>
      </div>
      ${gfNote}
      <div class="recipe-section">
        <h3>Ingrediënten</h3>
        <ul class="ingredient-list">${ingredients}</ul>
      </div>
      <div class="recipe-section">
        <h3>Bereiding</h3>
        <ol class="steps-list">${steps}</ol>
        ${tip}
      </div>`;

    document.getElementById('view-week').style.display = 'none';
    document.getElementById('view-recipe').style.display = 'block';
    window.scrollTo(0, 0);
  }

  function closeRecipe() {
    document.getElementById('view-recipe').style.display = 'none';
    document.getElementById('view-week').style.display = 'block';
  }

  function renderShopping() {
    if (!planData) return;
    const raw = planData.shopping_list || '';
    const container = document.getElementById('shopping-content');

    // Parse the shopping list text into sections
    const sections = [];
    let current = null;
    raw.split('\n').forEach(line => {
      const trimmed = line.trim();
      if (!trimmed) return;
      if (trimmed.startsWith('🛒')) return; // title
      if (trimmed.startsWith('*') && trimmed.endsWith('*')) {
        if (current) sections.push(current);
        current = { title: trimmed.replace(/\*/g, ''), items: [] };
      } else if (trimmed.startsWith('•') && current) {
        const gf = trimmed.includes('⚠️ GF');
        const text = trimmed.replace('•', '').replace('⚠️ GF', '').trim();
        current.items.push({ text, gf, id: String(Array.from(text).reduce((h,c) => Math.imul(31,h) + c.charCodeAt(0)|0, 0)).replace('-','n') });
      }
    });
    if (current) sections.push(current);

    if (sections.length === 0) {
      container.innerHTML = `<div class="empty"><div class="emoji">🛒</div><p>Nog geen boodschappenlijst.</p></div>`;
      return;
    }

    container.innerHTML = sections.map(sec => `
      <div class="shopping-section">
        <h3>${sec.title}</h3>
        ${sec.items.map(item => `
          <div class="shopping-item${checkedItems[item.id] ? ' checked' : ''}" onclick="toggleItem('${item.id}', this)">
            <input type="checkbox" ${checkedItems[item.id] ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem('${item.id}', this.closest('.shopping-item'))">
            <label>${item.text}</label>
            ${item.gf ? '<span class="gf-tag">GF</span>' : ''}
          </div>`).join('')}
      </div>`).join('');
  }

  function toggleItem(id, el) {
    checkedItems[id] = !checkedItems[id];
    localStorage.setItem('checked', JSON.stringify(checkedItems));
    el.classList.toggle('checked', checkedItems[id]);
    el.querySelector('input').checked = checkedItems[id];
  }

  function showView(view) {
    document.getElementById('view-week').style.display = view === 'week' ? 'block' : 'none';
    document.getElementById('view-recipe').style.display = 'none';
    document.getElementById('view-shopping').style.display = view === 'shopping' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  }

  loadPlan();
  // Refresh every 5 minutes
  setInterval(loadPlan, 5 * 60 * 1000);
</script>
</body>
</html>
