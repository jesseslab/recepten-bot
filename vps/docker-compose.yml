services:
  nginx:
    image: nginx:alpine
    container_name: recepten-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/etc/nginx/html:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - api
    networks:
      - recepten

  api:
    build: ./webhook
    container_name: recepten-api
    restart: unless-stopped
    environment:
      - VPS_SHARED_SECRET=${VPS_SHARED_SECRET}
      - NUC_ALLOWED_IP=${NUC_ALLOWED_IP}
    volumes:
      - ./data:/app/data
    networks:
      - recepten

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  certbot-www:
  certbot-certs:

networks:
  recepten:
    driver: bridge
